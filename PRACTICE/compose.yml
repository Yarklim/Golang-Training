services:
  go-practice-postgres:
    container_name: go-practice-env-postgres
    image: postgres:18.1-bookworm # bookworm - наиболее полная и стабильная версия
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_go_practice_data:/var/lib/postgresql
    restart: always
    networks:
      - go_practice

volumes:
  postgres_go_practice_data:

networks:
  go_practice: