services:
  go-practice-postgres:
    container_name: go-practice-env-postgres
    image: postgres:18-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_go_practice_data:/var/lib/postgresql/18/docker
    restart: always
    networks:
      - go-practice

  go-practice-migrate:
    image: migrate/migrate:v4.19.1
    working_dir: /migrations
    volumes:
      - ./migrations:/migrations
    networks:
      - go-practice

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: go-practice-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:go-practice-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - go-practice

volumes:
  postgres_go_practice_data:

networks:
  go-practice: